<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores - Martinez Logistics</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-root page-indicadores">
    
    <header class="main-header">
        <div class="header-container">
            <div class="brand-section">
                <h1>Panel de Indicadores</h1>
                <p>Rendimiento Semanal Operativo</p>
            </div>
            <nav class="main-nav">
                <a href="../index.html" class="nav-item">Panel de Carga</a>
                <a href="indicadores.html" class="nav-item active">Indicadores</a>
                <a href="historial.html" class="nav-item">Historial</a>
            </nav>
            <div class="metrics-section">
                <input type="week" id="filtro-semana" class="input-date">
            </div>
        </div>
    </header>

    <main class="viewport-main indicators-grid">
        <section class="kpi-container">
            <div class="kpi-card primary-kpi">
                <h3>Flota Total Semana</h3>
                <p id="kpi-unidades">0</p>
                <small>Unidades distintas operando</small>
            </div>
            <div class="kpi-card accent">
                <h3>Total Extras</h3>
                <p id="kpi-extras">0</p>
                <small>Guías adicionales cobradas</small>
            </div>
        </section>

        <section class="chart-container">
            <div class="chart-card">
                <h3>Rendimiento Diario: Vueltas vs Extras</h3>
                <div class="chart-wrapper">
                    <canvas id="chart-rendimiento"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="../js/pages/indicadores.js"></script>
</body>
</html>
